steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rsl-ai:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rsl-ai:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/rsl-ai:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/rsl-ai:latest']

  # Step 3: Deploy to Cloud Run with Cloud SQL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'rsl-ai'
      - '--image=gcr.io/$PROJECT_ID/rsl-ai:$COMMIT_SHA'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--add-cloudsql-instances=rsl-sys:me-central1:rsl-db'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,INVESTOR_PASSWORD=investor-password:latest,UPSTASH_REDIS_REST_URL=upstash-redis-url:latest,UPSTASH_REDIS_REST_TOKEN=upstash-redis-token:latest,RESEND_API_KEY=resend-api-key:latest'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/rsl-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/rsl-ai:latest'