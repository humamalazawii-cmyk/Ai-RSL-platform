version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: rsl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rsl
      POSTGRES_PASSWORD: rsl_dev_password
      POSTGRES_DB: rsl_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rsl']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
